name: CI/CD - video-processor-service

on:
  push:
    branches: ["main", "feature/modulo5"]
  pull_request:
    branches: ["main"]

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: video-processor-service
  SERVICE_PORT: "8083"
  EKS_CLUSTER: fiapx-cluster

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>autoflow-github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build & test
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: mvn -B clean verify

      - name: SonarCloud analysis
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=Sala-16-Hackathon-FIAP_video-processor-service \
            -Dsonar.organization=sala-16-hackathon-fiap \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/modulo5')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fiapx-video-processor-service
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GH_PACKAGES_TOKEN }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/modulo5')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create/Update Kubernetes secrets
        run: |
          kubectl create secret generic ${{ env.SERVICE_NAME }}-secrets \
            --from-literal=db-url="${{ secrets.PROCESSOR_DB_URL }}" \
            --from-literal=db-username="${{ secrets.PROCESSOR_DB_USERNAME }}" \
            --from-literal=db-password="${{ secrets.PROCESSOR_DB_PASSWORD }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=rabbitmq-host="rabbitmq.messaging.svc.cluster.local" \
            --from-literal=rabbitmq-user="${{ secrets.RABBITMQ_USERNAME }}" \
            --from-literal=rabbitmq-pass="${{ secrets.RABBITMQ_PASSWORD }}" \
            --from-literal=s3-bucket="${{ secrets.S3_BUCKET_NAME }}" \
            --from-literal=new-relic-license-key="${{ secrets.NEW_RELIC_LICENSE_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to EKS
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/fiapx-video-processor-service:latest"
          sed -i "s|PROCESSOR_SERVICE_IMAGE|$IMAGE|g" k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout restart deployment/${{ env.SERVICE_NAME }}
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} --timeout=300s
